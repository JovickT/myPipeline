services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"  # On mappe le port 3000 de ton PC vers le 80 du conteneur
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
  
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Indispensable pour que Watchtower gère Docker
    environment:
      # On lui donne tes accès GitHub pour qu'il puisse vérifier les nouvelles images
      - REPO_USER=${SECRET_USER}
      - REPO_PASS=${SECRET_TOKEN}
    command: --interval 30 --cleanup
    restart: always